<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descargar TikTok</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }
        input {
            width: 400px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <h1>📥 Descargar video de TikTok</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Pega la URL de TikTok" required>
        <br><br>
        <button type="submit">Descargar</button>
    </form>

</body>
</html>
